apply plugin: 'com.android.application'

android {
	compileSdk 36
	buildToolsVersion = '37.0.0'

	defaultConfig {
		applicationId "com.example.andrd_ado_vdo_tkbk_demo"

		minSdkVersion 14
		targetSdk 36
		versionCode 1
		versionName "2026.04.01"
		testInstrumentationRunner "android.support.test.runner.AndroidJUnitRunner"

		ndk {
            abiFilters 'x86' //指定NDK的平台。
            abiFilters 'x86_64' //指定NDK的平台。
			abiFilters 'armeabi-v7a' //指定NDK的平台。
			abiFilters 'arm64-v8a' //指定NDK的平台。
		}
	}
	buildTypes {
		release {
			minifyEnabled false
			proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
		}
	}
	namespace 'com.example.andrd_ado_vdo_tkbk_demo'
}

dependencies {
	implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'androidx.appcompat:appcompat:1.6.1'
	testImplementation 'junit:junit:4.13.2'
}
